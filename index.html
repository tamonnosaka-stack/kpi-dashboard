<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>個人別KPIダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f5f7fb; --card:#ffffff; --txt:#1e293b; --muted:#64748b; --line:#e2e8f0;
    --ok:#16a34a; --okbg:#dcfce7; --warn:#d97706; --warnbg:#fef3c7;
    --bad:#dc2626; --badbg:#fee2e2; --accent:#2563eb; --accentbg:#dbeafe;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
       background:var(--bg);color:var(--txt);padding:20px 24px 60px;}
  h1{font-size:22px;margin:0;}
  .sub{color:var(--muted);font-size:13px;margin:4px 0 0;}
  h2{font-size:16px;margin:30px 0 14px;display:flex;align-items:center;gap:8px;}
  h2 .n{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;
        display:inline-flex;align-items:center;justify-content:center;font-size:13px;}
  .topbar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;
          margin-top:16px;}
  .filter{display:flex;align-items:center;gap:8px;background:var(--card);
          padding:10px 14px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .filter label{font-size:13px;color:var(--muted);}
  select{background:#fff;color:var(--txt);border:1px solid var(--line);border-radius:8px;
         padding:7px 12px;font-size:14px;font-weight:600;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:14px;}
  .stat{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .stat .k{font-size:12px;color:var(--muted);}
  .stat .v{font-size:26px;font-weight:800;margin-top:2px;}
  .stat .v small{font-size:13px;font-weight:600;color:var(--muted);}
  .stat.hot{background:var(--accent);color:#fff;}
  .stat.hot .k,.stat.hot .v small{color:#dbeafe;}
  .stat.hot .note{font-size:10px;color:#e0ecff;margin-top:7px;line-height:1.5;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:16px;}
  .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .card h3{font-size:14px;margin:0 0 12px;}
  .card h3 .hint{font-weight:400;font-size:12px;color:var(--muted);margin-left:6px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);}
  th:first-child,td.m{text-align:left;}
  th{color:var(--muted);font-weight:600;font-size:12px;}
  td.big{font-weight:800;font-size:15px;}
  td.accent{color:var(--accent);}
  tr.team{background:var(--accentbg);font-weight:700;}
  .u{color:var(--muted);font-weight:400;font-size:11px;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;}
  .pill.ok{background:var(--okbg);color:var(--ok);}
  .pill.warn{background:var(--warnbg);color:var(--warn);}
  .pill.bad{background:var(--badbg);color:var(--bad);}
  .bar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:5px;}
  .bar>span{display:block;height:100%;border-radius:4px;}
  .behind{background:var(--bad);color:#fff;font-size:10px;padding:1px 6px;border-radius:6px;margin-left:6px;}
  .nv{font-size:14px;line-height:1.8;margin:0 0 10px;padding-left:10px;border-left:3px solid var(--accentbg);}
  .controls{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
  canvas{max-height:340px;}
  .needcard{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;}
  .needcard h3,.needcard .hint{color:#fff;}
  .needcard table th{color:#c7d2fe;}
  .needcard th,.needcard td{border-bottom:1px solid rgba(255,255,255,.18);}
  .needcard td.big{color:#fff;}
  .needcard .u{color:#c7d2fe;}
  footer{color:var(--muted);font-size:12px;margin-top:36px;line-height:1.7;}
  code{background:#e2e8f0;padding:1px 6px;border-radius:5px;}
</style>
</head>
<body>
  <h1>個人別KPIダッシュボード</h1>
  <p class="sub" id="sub"></p>

  <div class="topbar">
    <div class="filter">
      <label>表示するメンバー</label>
      <select id="memberFilter"></select>
    </div>
    <div class="sub" id="deadlineNote"></div>
  </div>

  <div class="cards" id="statCards"></div>

  <h2><span class="n">1</span>今月の達成に必要な架電数</h2>
  <div class="card needcard">
    <h3>必要架電数<span class="hint">今月の有効商談数から逆算 ／ 残り有効商談 ÷ アポ獲得率 ＝ 必要着電、÷着電率 ＝ 必要架電。締め日まで残り日数で1日ペースを算出。</span></h3>
    <div id="needTable"></div>
  </div>

  <h2><span class="n">2</span>今月の達成ギャップ</h2>
  <div class="grid" id="gapCards"></div>

  <h2><span class="n">3</span>月次推移</h2>
  <div class="card">
    <div class="controls">
      <div><label class="u">指標 </label><select id="trendMetric"></select></div>
      <div><label class="u">表示 </label>
        <select id="trendMode">
          <option value="actual">実績</option>
          <option value="achievement">達成率(%)</option>
        </select></div>
    </div>
    <canvas id="trendChart"></canvas>
  </div>

  <h2><span class="n">4</span>今月の総括</h2>
  <div class="card"><div id="narrative"></div></div>

  <footer>
    データ元: <span id="srcNote"></span><br>
    本ダッシュボードは <code>data.json</code> から自動生成されています。
    データを更新して <code>python3 kpi_dashboard.py</code> を再実行すると最新化されます。
  </footer>

const R = BUNDLE.result;

let state = {member: ALL};

function fmt(n, suf){ if(n===null||n===undefined||Number.isNaN(n)) return "—";
  return (Math.round(n*10)/10).toLocaleString("ja-JP") + (suf||""); }
function fmtInt(n, suf){ if(n===null||n===undefined) return "—";
  return Math.round(n).toLocaleString("ja-JP") + (suf||""); }
function achClass(a){ return a===null||a===undefined ? "" : (a>=100?"ok":(a>=70?"warn":"bad")); }
function achColor(a){ return a>=100?"#16a34a":(a>=70?"#d97706":"#dc2626"); }
function isShown(m){ return state.member===ALL || state.member===m; }

// --- セレクト初期化 ---
function initSelects(){
  const mf = document.getElementById("memberFilter");
  mf.innerHTML = '<option value="'+ALL+'">全員（IS合計）</option>';
  BUNDLE.members.forEach(m=>{
    const o=document.createElement("option"); o.value=m; o.textContent=m; mf.appendChild(o);
  });
  mf.addEventListener("change", e=>{ state.member=e.target.value; renderAll(); });

  Object.keys(CHART.metrics).forEach(k=>{
    const o=document.createElement("option"); o.value=k; o.textContent=CHART.metrics[k].name;
    document.getElementById("trendMetric").appendChild(o);
  });
  document.getElementById("trendMetric").addEventListener("change", drawTrend);
  document.getElementById("trendMode").addEventListener("change", drawTrend);
}

// --- サマリーカード ---
function renderStats(){
  const el = document.getElementById("statCards");
  let cards = [`<div class="stat hot"><div class="k">締め日まで残り営業日</div>
    <div class="v">${R.remaining_business_days}<small> 営業日</small></div>
    <div class="note">締め日 ${R.deadline}（最終営業日 ${R.last_business_day} の7日前）まで。基準日〜締め日の平日数（土日・祝を除く）で算出。</div></div>`];
  const order = ["call","valid_meeting","acquired_meeting"];
  order.forEach(k=>{
    const g = R.gap_metrics[k]; if(!g) return;
    let target, actual, ach;
    if(state.member===ALL){ target=g.team.target; actual=g.team.actual; ach=g.team.achievement; }
    else{ const row=g.rows.find(r=>r.member===state.member);
          if(!row){ return; } target=row.target; actual=row.actual; ach=row.achievement; }
    const c = ach===null?"":achClass(ach);
    cards.push(`<div class="stat"><div class="k">${g.name}</div>
      <div class="v">${fmtInt(actual)}<small> / ${fmtInt(target)}</small></div>
      <span class="pill ${c}">${fmt(ach,"%")}</span></div>`);
  });
  el.innerHTML = cards.join("");
}

  }).join("");
  document.getElementById("needTable").innerHTML = `<table>
    <thead><tr><th>メンバー</th><th>有効商談 実績/目標</th><th>残り有効商談</th>
      <th>アポ獲得率</th><th>着電率</th><th>必要着電</th><th>必要架電</th><th>必要ペース/日</th></tr></thead>
    <tbody>${body || '<tr><td colspan="8" class="u">該当データなし</td></tr>'}</tbody></table>`;
}

function renderNarrative(){
  const key = state.member===ALL ? "__all__" : state.member;
  const n = (R.narrative||{})[key];
  const el = document.getElementById("narrative");
  if(!n){ el.innerHTML='<span class="u">該当データなし</span>'; return; }
  el.innerHTML = ["valid","acquired","need","action"]
    .filter(k=>n[k]).map(k=>`<p class="nv">${n[k]}</p>`).join("");
}

// --- ギャップカード ---
function renderGap(){
  const wrap = document.getElementById("gapCards");
  wrap.innerHTML = Object.keys(R.gap_metrics).map(k=>{
    const g = R.gap_metrics[k];
    let rows = g.rows.filter(r=>isShown(r.member))
      .sort((a,b)=>b.gap-a.gap);
    const showTeam = state.member===ALL;
    const teamRow = showTeam ? `<tr class="team">
      <td class="m">IS合計</td><td>${fmtInt(g.team.actual)}/${fmtInt(g.team.target)}</td>
      <td class="accent big">${fmtInt(g.team.gap)}</td>
      <td class="big">${fmt(g.team.pace)}<span class="u">/日</span></td>
      <td><span class="pill ${achClass(g.team.achievement)}">${fmt(g.team.achievement,"%")}</span></td></tr>` : "";
    const body = rows.map(r=>{
      const bw = Math.min(r.achievement||0,100);
      return `<tr>
        <td class="m">${r.member}${r.behind?'<span class="behind">遅れ</span>':''}</td>
        <td>${fmtInt(r.actual)}/${fmtInt(r.target)}
          <div class="bar"><span style="width:${bw}%;background:${achColor(r.achievement||0)}"></span></div></td>
        <td class="accent big">${fmtInt(r.gap)}</td>
        <td class="big">${fmt(r.pace)}<span class="u">/日</span></td>
        <td><span class="pill ${achClass(r.achievement)}">${fmt(r.achievement,"%")}</span></td>
      </tr>`;
    }).join("");
    return `<div class="card"><h3>${g.name}
        <span class="hint">残り必要数と1営業日あたりの必要ペース</span></h3>
      <table><thead><tr><th>メンバー</th><th>実績/目標</th><th>残り必要</th>
        <th>必要ペース</th><th>達成率</th></tr></thead>
      <tbody>${teamRow}${body}</tbody></table></div>`;
  }).join("");
}

// --- グラフ ---
let trendChart;
function targetMembers(metricKey){
  const ser = CHART.metrics[metricKey].series;
  return Object.keys(ser).filter(m=>isShown(m));
}
function drawTrend(){
  const key=document.getElementById("trendMetric").value;
  const mode=document.getElementById("trendMode").value;
  const m=CHART.metrics[key];
  const datasets=targetMembers(key).map((mem,i)=>{
    const s=m.series[mem];
    let vals = mode==="achievement"
      ? s.actual.map((a,idx)=>{const t=s.target[idx]; return (t&&a!=null)?+(a/t*100).toFixed(1):null;})
      : s.actual;
    const col=PALETTE[BUNDLE.members.indexOf(mem)%PALETTE.length];
    return {label:mem,data:vals,borderColor:col,backgroundColor:col,tension:.25,
            spanGaps:true,borderWidth:2,pointRadius:3};
  });
  const cfg={type:"line",data:{labels:m.months,datasets},options:{responsive:true,
    plugins:{legend:{labels:{boxWidth:12}},
      title:{display:true,text:m.name+(mode==="achievement"?"（達成率%）":"（実績"+m.unit+"）")}},
    scales:{y:{beginAtZero:true}}}};
  if(trendChart) trendChart.destroy();
  trendChart=new Chart(document.getElementById("trendChart"),cfg);
}
function renderAll(){ renderStats(); renderNeed(); renderGap(); renderNarrative(); drawTrend(); }

document.getElementById("sub").textContent =
  `対象月: ${R.year}年${R.month}月　／　基準日: ${R.as_of}`;
document.getElementById("deadlineNote").textContent =
  `締め日: ${R.deadline}（最終営業日 ${R.last_business_day} の1週間前）／ 対象営業日 ${R.total_business_days}日（経過 ${R.elapsed_business_days}・残り ${R.remaining_business_days}）`;
document.getElementById("srcNote").textContent = BUNDLE.source;
initSelects();
renderAll();
</script>
</body>
</html>
